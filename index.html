<!doctype html>

<html>
    
    <head>
        <meta charset="utf-8">
        <title> Boids </title>
        <script src="main.js" type="module"></script>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        
        <canvas> </canvas>

        <div class="controls">
            
            <h3 style="margin-top: 0;"> Boids </h3>

            <div class="control-group">
                <label> Toggle Mouse Influence </label>
                <div class="vant-buttons">
                    <button class="vant-btn" id="mouseToggle"> Mouse </button>
                </div>
                <br>
                <label id="modeLabel"> Mouse influence in OFF </label>
            </div>
            <hr style="width: 100%; opacity: 0.3;">

            <div class="control-group">
                <label> Separation: <span id="sepVal"> 2.5 </span> </label>
                <input type="range" id="sepSlider" min="0.0" max="5.0" step="0.1" value="2.5">
            </div>

            <div class="control-group">
                <label> Alignment: <span id="aliVal"> 1.0 </span> </label>
                <input type="range" id="aliSlider" min="0.0" max="5.0" step="0.1" value="1.0">
            </div>

            <div class="control-group">
                <label> Cohesion: <span id="cohVal"> 1.0 </span> </label>
                <input type="range" id="cohSlider" min="0.0" max="5.0" step="0.1" value="1.0">
            </div>


        </div>
    
    </body>
    
</html>
